services:
  postgres:
    image: postgres:16-alpine
    container_name: classmanager-next-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: classmanager_next
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - classmanager_next_postgres_data:/var/lib/postgresql/data

volumes:
  classmanager_next_postgres_data:
