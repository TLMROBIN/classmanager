<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - 班级管理系统</title>
    <link rel="stylesheet" href="/vendor/tailwind.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app" class="max-w-6xl mx-auto p-6">
        <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">管理员后台</h1>
                    <p class="text-gray-500 text-sm mt-1">管理用户和系统数据</p>
                </div>
                <div class="flex gap-3">
                    <a href="/" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-700 transition">返回主页</a>
                    <button id="logoutBtn" class="px-4 py-2 bg-red-50 hover:bg-red-100 text-red-600 rounded-lg transition">退出登录</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
            <div class="bg-white rounded-xl shadow-sm p-6">
                <div class="text-3xl font-bold text-blue-600" id="totalUsers">-</div>
                <div class="text-gray-500 text-sm mt-1">注册用户</div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6">
                <div class="text-3xl font-bold text-green-600" id="totalData">-</div>
                <div class="text-gray-500 text-sm mt-1">数据记录</div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6">
                <div class="text-3xl font-bold text-purple-600" id="adminCount">-</div>
                <div class="text-gray-500 text-sm mt-1">管理员</div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="p-4 border-b bg-gray-50">
                <h2 class="font-bold text-gray-800">用户列表</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">ID</th>
                            <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">用户名</th>
                            <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">邮箱</th>
                            <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">角色</th>
                            <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">数据量</th>
                            <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">注册时间</th>
                            <th class="px-4 py-3 text-left text-sm font-medium text-gray-500">操作</th>
                        </tr>
                    </thead>
                    <tbody id="userList" class="divide-y">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="resetPasswordModal" class="fixed inset-0 bg-black/50 items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-md mx-4">
            <h3 id="resetModalTitle" class="text-lg font-bold text-gray-800 mb-1"></h3>
            <p id="resetModalUser" class="text-sm text-gray-500 mb-4"></p>
            <div class="mb-4">
                <label for="resetNewPassword" class="block text-sm font-medium text-gray-700 mb-1">新密码</label>
                <input type="password" id="resetNewPassword" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="至少6个字符" autocomplete="new-password">
            </div>
            <div class="mb-4">
                <label for="resetNewPasswordConfirm" class="block text-sm font-medium text-gray-700 mb-1">确认新密码</label>
                <input type="password" id="resetNewPasswordConfirm" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="再次输入新密码" autocomplete="new-password">
            </div>
            <p id="resetModalError" class="text-sm text-red-600 mb-3 hidden"></p>
            <div class="flex justify-end gap-3">
                <button id="resetModalCancel" type="button" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-gray-700 transition">取消</button>
                <button id="resetModalConfirm" type="button" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition">确认重置</button>
            </div>
        </div>
    </div>

    <script src="/session.js"></script>
    <script src="/admin.js"></script>
</body>
</html>
