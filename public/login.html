<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 班级管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .gradient-bg {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="glass rounded-2xl shadow-2xl max-w-md w-full overflow-hidden">
        <div class="p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">班级管理系统</h1>
                <p class="text-gray-500">多用户版本</p>
            </div>

            <div id="loginForm">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                        <input type="text" id="username" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                            placeholder="请输入用户名" autocomplete="username">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                        <input type="password" id="password" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                            placeholder="请输入密码" autocomplete="current-password">
                    </div>
                    <button onclick="handleLogin()" 
                        class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition transform active:scale-95">
                        登录
                    </button>
                </div>
                
                <div class="mt-6 text-center">
                    <p class="text-gray-500">还没有账户？ 
                        <button onclick="showRegister()" class="text-blue-600 hover:underline font-medium">立即注册</button>
                    </p>
                </div>
            </div>

            <div id="registerForm" class="hidden">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                        <input type="text" id="regUsername" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                            placeholder="3-20个字符" autocomplete="username">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">邮箱（可选）</label>
                        <input type="email" id="regEmail" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                            placeholder="example@email.com" autocomplete="email">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                        <input type="password" id="regPassword" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                            placeholder="至少6个字符" autocomplete="new-password">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                        <input type="password" id="regConfirmPassword" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                            placeholder="再次输入密码" autocomplete="new-password">
                    </div>
                    <button onclick="handleRegister()" 
                        class="w-full bg-green-600 text-white py-3 rounded-lg font-medium hover:bg-green-700 transition transform active:scale-95">
                        注册
                    </button>
                </div>
                
                <div class="mt-6 text-center">
                    <p class="text-gray-500">已有账户？ 
                        <button onclick="showLogin()" class="text-blue-600 hover:underline font-medium">返回登录</button>
                    </p>
                </div>
            </div>

            <div id="loading" class="hidden text-center py-8">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent"></div>
                <p class="mt-4 text-gray-500">处理中...</p>
            </div>
        </div>

    <script>
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }

        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }

        function showLoading(show) {
            document.getElementById('loginForm').classList.toggle('hidden', show);
            document.getElementById('registerForm').classList.toggle('hidden', show);
            document.getElementById('loading').classList.toggle('hidden', !show);
        }

        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }

            showLoading(true);

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    // 清除旧用户的缓存数据
                    localStorage.removeItem('class_manager_data');
                    localStorage.removeItem('attendance_records');
                    localStorage.removeItem('class_treasure_data');
                    localStorage.removeItem('class_manager_snapshots');
                    localStorage.removeItem('cm_offline_snapshot');
                    // 保存新的登录信息
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    alert(data.error || '登录失败');
                    showLoading(false);
                }
            } catch (err) {
                alert('网络错误，请重试');
                showLoading(false);
            }
        }

        async function handleRegister() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;

            if (!username || !password) {
                alert('请填写用户名和密码');
                return;
            }

            if (username.length < 3 || username.length > 20) {
                alert('用户名长度需在3-20个字符之间');
                return;
            }

            if (password.length < 6) {
                alert('密码长度至少6个字符');
                return;
            }

            if (password !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }

            showLoading(true);

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    // 清除旧用户的缓存数据
                    localStorage.removeItem('class_manager_data');
                    localStorage.removeItem('attendance_records');
                    localStorage.removeItem('class_treasure_data');
                    localStorage.removeItem('class_manager_snapshots');
                    localStorage.removeItem('cm_offline_snapshot');
                    // 保存新的登录信息
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    alert(data.error || '注册失败');
                    showLoading(false);
                }
            } catch (err) {
                alert('网络错误，请重试');
                showLoading(false);
            }
        }

        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (!document.getElementById('loginForm').classList.contains('hidden')) {
                    handleLogin();
                } else if (!document.getElementById('registerForm').classList.contains('hidden')) {
                    handleRegister();
                }
            }
        });
    </script>
</body>
</html>
