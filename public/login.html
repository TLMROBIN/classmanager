<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 班级管理系统</title>
    <link rel="stylesheet" href="/vendor/tailwind.css">
    <style>
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .gradient-bg {
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
        }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="glass rounded-2xl shadow-2xl max-w-md w-full overflow-hidden">
        <div class="p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800 mb-2">班级管理系统</h1>
                <p class="text-gray-500">多用户版本</p>
            </div>

            <div id="attendanceResumeNotice" class="hidden mb-5 rounded-lg border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-900" role="status">
                登录状态已失效。重新登录后，系统会保留刚才的考勤对象，供你确认后重试。
            </div>

            <div id="loginForm">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                        <input type="text" id="username" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                            placeholder="请输入用户名" autocomplete="username">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                        <input type="password" id="password" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                            placeholder="请输入密码" autocomplete="current-password">
                    </div>
                    <button id="loginButton"
                        class="w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition transform active:scale-95">
                        登录
                    </button>
                </div>
                
                <div class="mt-6 text-center">
                    <p class="text-gray-500">还没有账户？ 
                        <button id="showRegisterButton" class="text-blue-600 hover:underline font-medium">立即注册</button>
                    </p>
                    <p class="text-gray-500 mt-2">需要修改密码？
                        <button id="showChangePasswordButton" class="text-blue-600 hover:underline font-medium">修改密码</button>
                    </p>
                </div>
            </div>

            <div id="registerForm" class="hidden">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                        <input type="text" id="regUsername" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                            placeholder="3-20个字符" autocomplete="username">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">邮箱（可选）</label>
                        <input type="email" id="regEmail" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                            placeholder="example@email.com" autocomplete="email">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                        <input type="password" id="regPassword" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                            placeholder="至少6个字符" autocomplete="new-password">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                        <input type="password" id="regConfirmPassword" 
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                            placeholder="再次输入密码" autocomplete="new-password">
                    </div>
                    <button id="registerButton"
                        class="w-full bg-green-600 text-white py-3 rounded-lg font-medium hover:bg-green-700 transition transform active:scale-95">
                        注册
                    </button>
                </div>
                
                <div class="mt-6 text-center">
                    <p class="text-gray-500">已有账户？ 
                        <button id="showLoginButton" class="text-blue-600 hover:underline font-medium">返回登录</button>
                    </p>
                </div>
            </div>

            <div id="changePasswordForm" class="hidden">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                        <input type="text" id="changeUsername"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                            placeholder="请输入用户名" autocomplete="username">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">当前密码</label>
                        <input type="password" id="changeCurrentPassword"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                            placeholder="请输入当前密码" autocomplete="current-password">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">新密码</label>
                        <input type="password" id="changeNewPassword"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                            placeholder="至少6个字符" autocomplete="new-password">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">确认新密码</label>
                        <input type="password" id="changeConfirmPassword"
                            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                            placeholder="再次输入新密码" autocomplete="new-password">
                    </div>
                    <button id="changePasswordButton"
                        class="w-full bg-amber-600 text-white py-3 rounded-lg font-medium hover:bg-amber-700 transition transform active:scale-95">
                        确认修改密码
                    </button>
                </div>

                <div class="mt-6 text-center">
                    <p class="text-gray-500">想起密码了？
                        <button id="showLoginFromChangeButton" class="text-blue-600 hover:underline font-medium">返回登录</button>
                    </p>
                </div>
            </div>

            <div id="loading" class="hidden text-center py-8">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-600 border-t-transparent"></div>
                <p class="mt-4 text-gray-500">处理中...</p>
            </div>
        </div>
    <script src="/session.js"></script>
    <script src="/login.js"></script>
</body>
</html>
